<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diksh Sawaliya · Software Engineer</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link href="base.css" rel="stylesheet" />
<link href="layout.css" rel="stylesheet" />
<link href="components.css" rel="stylesheet" />
</head>
<body>
<div class="toast" id="toast"></div>

<!-- Nav -->
<nav id="nav">
  <a class="nav-logo" id="navLogo" href="#home"></a>
  <div class="nav-right">
    <ul class="nav-links" id="navLinks"></ul>
    <div class="header-social" id="socialLinks"></div>
    <button class="theme-btn" aria-label="Toggle theme">
      <span class="i-sun">☀</span><span class="i-moon">☾</span>
    </button>
  </div>
</nav>

<!-- Hero -->
<section class="hero" id="home">
  <div id="heroContent"></div>
</section>

<!-- Skills -->
<section id="skills">
  <div id="skillsContent"></div>
</section>

<!-- Journey -->
<section id="journey">
  <div id="journeyContent"></div>
</section>

<!-- Experience -->
<section id="experience">
  <div id="experienceContent"></div>
</section>

<!-- Projects -->
<section id="projects">
  <div id="projectsContent"></div>
  <div class="proj-grid reveal" id="projGrid"></div>
</section>

<!-- Contact -->
<section id="contact">
  <div id="contactContent"></div>
</section>

<footer id="siteFooter"></footer>

<!-- Add Project Modal -->
<div class="modal-ov" id="addModal">
  <div class="modal">
    <h2>Add New Project</h2>
    <p class="sub">Appears on your portfolio instantly.</p>
    <div class="fld"><label>Project Title *</label><input type="text" id="pTitle" placeholder="e.g. Voice SDK for Android" /></div>
    <div class="fld"><label>Description *</label><textarea id="pDesc" rows="3" placeholder="What did you build? What problem did it solve?"></textarea></div>
    <div class="fld"><label>Tech Stack (comma separated)</label><input type="text" id="pTags" placeholder="Kotlin, Jetpack Compose, Retrofit" /></div>
    <div class="fld"><label>Domain / Type</label><input type="text" id="pDomain" placeholder="e.g. SDK · Android · Fintech" /></div>
    <div class="fld"><label>Year</label><input type="text" id="pYear" placeholder="2025" /></div>
    <div class="fld"><label>GitHub Link</label><input type="text" id="pGitHub" placeholder="https://github.com/username/repo" /></div>
    <div class="modal-acts">
      <button id="addCancel" class="btn-cancel">Cancel</button>
      <button id="addSave" class="btn-save">Save Project</button>
    </div>
  </div>
</div>

<!-- PIN Modal -->
<div class="modal-ov" id="pinModal">
  <div class="modal" style="max-width:340px;text-align:center">
    <h2>Admin Access</h2>
    <p class="sub">Enter your 4-digit PIN to manage projects</p>
    <div class="pin-row">
      <input class="pin-d" id="p0" maxlength="1" type="password" inputmode="numeric" />
      <input class="pin-d" id="p1" maxlength="1" type="password" inputmode="numeric" />
      <input class="pin-d" id="p2" maxlength="1" type="password" inputmode="numeric" />
      <input class="pin-d" id="p3" maxlength="1" type="password" inputmode="numeric" />
    </div>
    <div class="pin-err" id="pinErr"></div>
    <div class="modal-acts" style="justify-content:center;margin-top:14px">
      <button id="pinCancel" class="btn-cancel">Cancel</button>
      <button id="pinUnlock" class="btn-save">Unlock</button>
    </div>
  </div>
</div>

<!-- CV Modal -->
<div class="modal-ov" id="cvModal">
  <div class="modal" style="max-width:900px; width:96%; height:90%; padding:0; overflow:hidden;">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(0,0,0,0.06);">
      <strong>Curriculum Vitae</strong>
      <div>
        <a id="cvDownload" href="Diksh_Sawaliya_Resume.pdf" target="_blank" download class="btn btn-outline" style="margin-right:8px">Download</a>
        <button id="cvClose" class="btn-cancel">Close</button>
      </div>
    </div>
    <iframe id="cvIframe" src="" style="width:100%;height:calc(100% - 56px);border:0" title="CV viewer"></iframe>
  </div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
